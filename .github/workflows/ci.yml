name: CI

"on":
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_SECRET: ci-auth-secret-at-least-32-characters
      AUTH_TRUST_HOST: "true"
      AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      E2E_TEST_PASSWORD: Password123!
      EXPO_PUBLIC_API_BASE_URL: http://localhost:3000
      GEMINI_API_KEY: ci-dummy-gemini-api-key
      GEMINI_MODEL: gemini-2.5-flash
      GITHUB_ID: ci-dummy-github-id
      GITHUB_SECRET: ci-dummy-github-secret
      GOOGLE_CLIENT_ID: ci-dummy-google-client-id
      GOOGLE_CLIENT_SECRET: ci-dummy-google-client-secret
      MOBILE_AUTH_SECRET: ci-mobile-auth-secret-at-least-32-characters

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json

      - name: Use project npm version
        run: npm install -g npm@10.9.0

      - name: Install web dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Mobile typecheck
        working-directory: mobile
        run: npm run typecheck
